version: "3.9"

volumes:
  rag_data:

services:
  # ── Ingestion job (run once to build the FAISS index) ──────────────────────
  ingest:
    profiles: [ingest]
    build:
      context: .
      target: runtime
    command: python scripts/ingest.py
    volumes:
      - rag_data:/app/data
    env_file:
      - .env
    restart: "no"

  # ── API server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    command:
      - uvicorn
      - rag_assistant.api.app:create_app
      - "--factory"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - rag_data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
