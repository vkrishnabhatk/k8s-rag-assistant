apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-assistant.fullname" . }}
  labels:
    {{- include "rag-assistant.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "rag-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rag-assistant.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "rag-assistant.fullname" . }}-config
            - secretRef:
                name: {{ .Values.anthropic.apiKeySecretName }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: rag-data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: rag-data
          persistentVolumeClaim:
            claimName: {{ include "rag-assistant.fullname" . }}-data
      {{- end }}
