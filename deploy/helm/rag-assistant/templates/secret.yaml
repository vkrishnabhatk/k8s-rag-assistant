apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.anthropic.apiKeySecretName }}
  labels:
    {{- include "rag-assistant.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Replace this placeholder with your actual Anthropic API key before deploying.
  # Recommended: use an external secret manager (e.g. External Secrets Operator).
  {{ .Values.anthropic.apiKeySecretKey }}: "REPLACE_WITH_ACTUAL_API_KEY"
